<!DOCTYPE html>

    <style>
        /* Menu section styles */
        .menu-section {
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--soft-cream);
            min-height: 50vh;
        }

        .menu-title {
            font-size: 3rem;
            color: var(--hot-red);
            margin-bottom: 40px;
            text-align: center;
            text-transform: uppercase;
        }

        .menu-image-container {
            max-width: 900px;
            width: 100%;
            border: 8px solid var(--hot-red);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            background-color: white;
        }

        .full-menu-img {
            width: 100%;
            height: auto;
            display: block;
        }

        @media (max-width: 768px) {
            .menu-title {
                font-size: 2rem;
            }
            
            .menu-image-container {
                border-width: 5px;
            }
        }
    </style>
</head>
