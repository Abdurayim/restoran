<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Menu | Muhsina Dollar Somsa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .menu-page-container {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--soft-cream);
            min-height: 100vh;
        }

        .menu-title {
            font-size: 3rem;
            color: var(--hot-red);
            margin-bottom: 30px;
            text-align: center;
            text-transform: uppercase;
        }

        .menu-image-container {
            max-width: 900px;
            width: 100%;
            border: 8px solid var(--hot-red);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            background-color: white;
        }

        .full-menu-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .actions {
            margin-top: 40px;
            margin-bottom: 40px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="container">
            <div class="logo-wrapper">
                <img src="logo.jpeg" alt="Logo" class="nav-logo-img">
                <h1 class="logo"><span>Muhsina</span> Dollar Somsa</h1>
            </div>
            
            <div class="nav-right">
                <a href="index.html" class="menu-btn">HOME</a>
            </div>
        </div>
    </nav>

    <div class="menu-page-container">
        <h2 class="menu-title">Bizning Menu</h2>

        <div class="menu-image-container">
            <img src="menu.jpg" alt="Muhsina Full Menu" class="full-menu-img">
        </div>

        <div class="actions">
            <a href="index.html" class="order-btn" style="text-decoration: none;">ASOSIY SAHIFA</a>
        </div>
    </div>

</body>
</html>
